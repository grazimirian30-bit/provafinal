<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Ética: Kant, Deontologia e Sociedade</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; --correct: #27ae60; --wrong: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; color: var(--accent); }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 8px; background: #fff; }
        .options label { display: block; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #f5f0f9; }
        .feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 5px; font-weight: bold; }
        .correct-style { background: #d4edda; color: #155724; border-left: 5px solid var(--correct); }
        .wrong-style { background: #f8d7da; color: #721c24; border-left: 5px solid var(--wrong); }
        .btn-check { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulado: Ética, Deontologia e Teleologia</h1>
    <div id="quiz-box"></div>
    <button class="btn-check" onclick="calculateResult()">Finalizar Simulado de Ética</button>
    <div id="score-board" style="display:none; text-align:center; margin-top:20px; font-size:24px; font-weight: bold;"></div>
</div>

<script>
    const db = [
        {
            q: "A ética kantiana é frequentemente descrita como Deontológica. O que define essencialmente uma ética deontológica?",
            alt: [
                "A avaliação da ação baseada exclusivamente nas consequências finais (o fim justifica os meios).",
                "A ação baseada no cumprimento do dever moral, independentemente das consequências ou desejos pessoais.",
                "A busca pela felicidade individual através do prazer sensorial.",
                "O cumprimento de ordens religiosas visando uma recompensa divina pós-morte.",
                "A ausência de regras fixas, permitindo que cada indivíduo decida sua própria moral."
            ],
            cor: 1
        },
        {
            q: "Kant formulou o 'Imperativo Categórico'. Qual das frases abaixo melhor resume este conceito?",
            alt: [
                "Aja de acordo com o que te faz feliz no momento.",
                "Aja apenas se houver uma garantia de que você não será punido pela lei.",
                "Aja apenas segundo uma máxima tal que possas querer ao mesmo tempo que se torne lei universal.",
                "Aja conforme os mandamentos da sua religião, excluindo outras visões de mundo.",
                "Aja de forma a obter o maior lucro possível para o maior número de pessoas."
            ],
            cor: 2
        },
        {
            q: "Diferente da Deontologia, a Ética Teleológica (ou Consequencialista) foca em:",
            alt: [
                "O cumprimento de normas rígidas e imutáveis.",
                "A intenção pura do agente, ignorando o resultado.",
                "A finalidade (télos) ou o resultado da ação para determinar sua moralidade.",
                "A obediência cega a uma autoridade política.",
                "O estudo da origem das palavras éticas."
            ],
            cor: 2
        },
        {
            q: "Para Kant, uma ação feita por 'inclinação' (medo de punição ou desejo de recompensa) não possui valor moral pleno. Para ter valor moral, a ação deve ser feita:",
            alt: ["Por hábito social.", "Por medo de Deus.", "Por dever.", "Por pressão dos pares.", "Por instinto de sobrevivência."],
            cor: 2
        },
        {
            q: "No contexto social e religioso, o 'Fundamentalismo' ético pode ser perigoso por quê?",
            alt: [
                "Porque prega a tolerância total a todas as ideias.",
                "Porque impõe uma visão única e absoluta de verdade, muitas vezes ignorando a pluralidade e o diálogo racional.",
                "Porque incentiva o questionamento constante das leis.",
                "Porque é uma forma de ética que não possui regras.",
                "Porque foca apenas na ciência e ignora a fé."
            ],
            cor: 1
        },
        {
            q: "O Utilitarismo é um exemplo clássico de ética teleológica. Seu princípio fundamental é:",
            alt: [
                "A proteção dos direitos individuais acima de qualquer maioria.",
                "A promoção da maior felicidade para o maior número de pessoas.",
                "O sacrifício total de todo prazer em nome da dor.",
                "A submissão total às leis do Estado, mesmo que sejam injustas.",
                "A busca pela virtude através do isolamento social."
            ],
            cor: 1
        },
        {
            q: "Analise a asserção: 'A religião e a ética são idênticas'. Esta frase é falsa no contexto filosófico porque:",
            alt: [
                "A religião não lida com valores morais.",
                "A ética busca fundamentos racionais e universais que podem ser compartilhados mesmo por quem não possui fé religiosa.",
                "A ética é apenas para ateus.",
                "A religião não permite que as pessoas ajam bem.",
                "A ética é baseada apenas em sentimentos, enquanto a religião é baseada em fatos."
            ],
            cor: 1
        },
        {
            q: "Em uma perspectiva kantiana, mentir para salvar uma vida seria considerado:",
            alt: [
                "Correto, pois salvar uma vida é o resultado mais importante.",
                "Incorreto, pois a mentira não pode ser universalizada como uma lei moral (o dever de dizer a verdade é absoluto).",
                "Depende do que a pessoa que vai morrer representa para a sociedade.",
                "Correto, desde que ninguém descubra a mentira.",
                "Uma ação sem qualquer relevância ética."
            ],
            cor: 1
        },
        {
            q: "O conceito de 'Autonomia' em Kant refere-se à:",
            alt: [
                "Capacidade do indivíduo de seguir seus desejos mais impulsivos.",
                "Capacidade da razão humana de dar a si mesma a sua própria lei moral, sem depender de autoridades externas.",
                "Independência financeira do indivíduo.",
                "Liberdade de agir sem qualquer tipo de lei ou regra.",
                "Obediência total aos pais e mestres."
            ],
            cor: 1
        },
        {
            q: "A ética da 'Alteridade' foca na relação com o 'Outro'. Em contextos de diversidade social, isso implica em:",
            alt: [
                "Ignorar as diferenças para tratar todos como se fossem idênticos.",
                "Reconhecer e respeitar a dignidade do outro em sua diferença e singularidade.",
                "Tentar converter o outro à sua própria cultura.",
                "Competir com o outro para provar superioridade moral.",
                "Apenas tolerar a existência do outro sem interagir."
            ],
            cor: 1
        },
        {
            q: "A Deontologia Profissional (como o código de ética de engenheiros ou médicos) é inspirada no pensamento de que:",
            alt: [
                "O profissional deve fazer o que for melhor para o seu próprio bolso.",
                "Existem deveres e normas específicas da profissão que devem ser seguidos pelo bem do exercício da função e da sociedade.",
                "As leis do mercado são as únicas que importam.",
                "O profissional não tem responsabilidade sobre suas ações.",
                "A ética só se aplica se o cliente for da mesma religião."
            ],
            cor: 1
        },
        {
            q: "Kant afirma que o homem deve ser tratado sempre como um 'fim em si mesmo' e nunca apenas como um 'meio'. Isso condena:",
            alt: [
                "A educação pública.",
                "A amizade sincera.",
                "A exploração do ser humano como ferramenta para lucro ou desejos de outrem.",
                "A prática de esportes.",
                "O uso de roupas de marca."
            ],
            cor: 2
        },
        {
            q: "A 'Teleologia' na Grécia Antiga (Aristóteles) ligava a ética à busca da 'Eudaimonia'. O que significa este termo?",
            alt: ["Prazer momentâneo.", "Sucesso financeiro.", "Felicidade como florescimento humano e realização da virtude.", "Poder político.", "Sofrimento purificador."],
            cor: 2
        },
        {
            q: "Sobre a relação entre ética e leis jurídicas, é correto afirmar:",
            alt: [
                "Tudo o que é legal (está na lei) é automaticamente ético.",
                "A ética e a lei são esferas diferentes; uma lei pode ser legal mas ser considerada antiética.",
                "As leis não precisam de fundamentos éticos.",
                "A ética só existe onde não existem leis.",
                "Somente juízes podem agir de forma ética."
            ],
            cor: 1
        },
        {
            q: "O 'Relativismo Moral' defende que a ética depende da cultura ou época. Um desafio crítico a essa visão é:",
            alt: [
                "Ela permite que todas as pessoas concordem sempre.",
                "Ela pode ser usada para justificar atrocidades (como a escravidão) sob o argumento de que 'era a cultura da época'.",
                "Ela é a única forma de religiosidade aceitável.",
                "Ela impede o comércio entre países.",
                "Ela obriga todos a serem vegetarianos."
            ],
            cor: 1
        },
        {
            q: "A 'Ética da Responsabilidade' (Max Weber) é crucial na política e contrapõe-se à ética da convicção absoluta porque:",
            alt: [
                "Exige que o agente preveja as consequências de suas ações e responda por elas.",
                "Diz que o político deve apenas seguir sua fé, não importa o que aconteça.",
                "Afirma que ninguém é responsável por nada na vida pública.",
                "Foca apenas no passado, não no futuro.",
                "Diz que a ética não se aplica a governantes."
            ],
            cor: 0
        },
        {
            q: "Na visão social contemporânea, a ética é 'pública' quando:",
            alt: [
                "É discutida apenas em redes sociais.",
                "Diz respeito a valores que permitem a convivência justa em uma sociedade plural e democrática.",
                "O governo obriga todos a terem a mesma opinião.",
                "Não existem segredos entre as pessoas.",
                "Apenas o setor público precisa segui-la."
            ],
            cor: 1
        },
        {
            q: "O conceito de 'Justiça' para a maioria das teorias éticas sociais envolve:",
            alt: [
                "Dar o mesmo prêmio para todos, independentemente do esforço.",
                "A distribuição equitativa de direitos, deveres e bens sociais de forma fundamentada.",
                "A vingança contra quem nos ofendeu.",
                "A acumulação de riqueza por uma pequena elite.",
                "O silenciamento das minorias."
            ],
            cor: 1
        },
        {
            q: "A 'Heteronomia' moral ocorre quando:",
            alt: [
                "O indivíduo cria suas próprias leis.",
                "As ações do indivíduo são determinadas por forças externas (leis, religião dogmática, pressão social) sem reflexão própria.",
                "O indivíduo é totalmente livre.",
                "A pessoa age de forma justa por amor ao próximo.",
                "O indivíduo estuda filosofia."
            ],
            cor: 1
        },
        {
            q: "Qual o papel do 'Diálogo' na ética contemporânea de Habermas?",
            alt: [
                "Servir apenas para convencer o outro de que eu estou certo.",
                "Construir normas válidas através do entendimento mútuo entre sujeitos livres e iguais.",
                "Ganhar tempo antes de iniciar um conflito físico.",
                "Substituir o pensamento individual pelo pensamento do grupo.",
                "Nenhum, pois a ética é puramente silenciosa."
            ],
            cor: 1
        }
    ];

    function loadQuiz() {
        const box = document.getElementById('quiz-box');
        db.forEach((item, i) => {
            box.innerHTML += `
                <div class="question">
                    <p><strong>Questão ${i+1}:</strong> ${item.q}</p>
                    <div class="options">
                        ${item.alt.map((a, j) => `
                            <label><input type="radio" name="q${i}" value="${j}"> ${a}</label>
                        `).join('')}
                    </div>
                    <div id="f${i}" class="feedback"></div>
                </div>
            `;
        });
    }

    function calculateResult() {
        let score = 0;
        db.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const f = document.getElementById(`f${i}`);
            f.style.display = "block";
            if(sel && parseInt(sel.value) === item.cor) {
                score++;
                f.innerHTML = "✅ RESPOSTA CORRETA";
                f.className = "feedback correct-style";
            } else {
                f.innerHTML = `❌ INCORRETO. A resposta correta é: <br><em>"${item.alt[item.cor]}"</em>`;
                f.className = "feedback wrong-style";
            }
        });
        const res = document.getElementById('score-board');
        res.style.display = "block";
        res.innerHTML = `Resultado: ${score} de ${db.length} acertos (${(score/db.length*100).toFixed(1)}%)`;
        window.scrollTo(0, 0);
    }
    loadQuiz();
</script>
</body>
</html>
